<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    color: #111;
    background: #fff;
  }

  .job-card-page {
    width: 210mm;
    min-height: 297mm;
    padding: 6mm 8mm;
    page-break-after: always;
    display: flex;
    flex-direction: column;
  }
  .job-card-page:last-child { page-break-after: avoid; }

  /* ── TOP HEADER ── */
  .top-header {
    background: #1a3a6e;
    color: #fff;
    padding: 7px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 4px 4px 0 0;
    margin-bottom: 1px;
  }
  .top-header .firm-name {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .top-header .firm-tagline {
    font-size: 9px;
    color: #93c5fd;
    margin-top: 2px;
    letter-spacing: 1.5px;
  }
  .top-header .job-badge { text-align: right; }
  .top-header .job-no {
    font-size: 28px;
    font-weight: 900;
    color: #fbbf24;
    letter-spacing: 1px;
    line-height: 1;
  }
  .top-header .job-date {
    font-size: 10px;
    color: #bfdbfe;
    margin-top: 2px;
  }

  /* ── JOB META BAR ── */
  .meta-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: #e2e8f0;
    border: 1.5px solid #cbd5e1;
    margin-bottom: 5px;
  }
  .meta-cell { background: #f8fafc; padding: 5px 7px; }
  .meta-cell.wide { grid-column: span 2; }
  .meta-cell.full { grid-column: span 4; }
  .meta-label {
    font-size: 8.5px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .meta-value {
    font-size: 11.5px;
    font-weight: 700;
    color: #0f172a;
  }
  .meta-value.highlight { color: #1d4ed8; }
  .meta-value.red       { color: #dc2626; }

  /* ── ITEM BADGE ── */
  .item-badge {
    background: #1a3a6e;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 11px;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-badge .item-name {
    font-size: 13px;
    font-weight: 900;
    color: #fbbf24;
  }

  /* ── CARD BODY ── */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 0;
    border: 1.5px solid #1a3a6e;
    flex: 1;
  }
  .divider-line { background: #1a3a6e; }
  .section { padding: 6px 10px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 13px;
    font-weight: 900;
    text-align: center;
    color: #1a3a6e;
    border-bottom: 1.5px solid #1a3a6e;
    padding-bottom: 3px;
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── FIELD ROWS ── */
  .field-row {
    display: flex;
    align-items: baseline;
    margin-bottom: 6px;
    border-bottom: 1px dotted #94a3b8;
    padding-bottom: 3px;
    min-height: 18px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    font-size: 11px;
    color: #374151;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .field-colon {
    margin: 0 4px;
    color: #374151;
    font-size: 11px;
    flex-shrink: 0;
  }
  .field-value {
    font-size: 11px;
    font-weight: 700;
    color: #111827;
    flex: 1;
    word-break: break-word;
    line-height: 1.3;
  }
  .field-value.blue  { color: #1d4ed8; }
  .field-value.red   { color: #dc2626; }
  .field-value.green { color: #15803d; }

  /* ── INLINE GRID (paper details) ── */
  .field-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 3px 5px;
    align-items: center;
    margin-bottom: 6px;
  }
  .fg-label {
    font-size: 10px;
    color: #4b5563;
    font-weight: 700;
  }
  .fg-value {
    font-size: 11px;
    font-weight: 700;
    color: #111;
    border-bottom: 1px solid #d1d5db;
    padding-bottom: 1px;
  }

  /* ── PRESS CHECKBOXES ── */
  .press-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    margin-bottom: 6px;
  }
  .press-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .checkbox {
    width: 11px; height: 11px;
    border: 1.5px solid #374151;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .checkbox.checked {
    background: #1a3a6e;
    border-color: #1a3a6e;
    color: #fff;
  }

  /* ── INSIDE PAPERS TABLE ── */
  .papers-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 6px;
    font-size: 10px;
  }
  .papers-table th {
    background: #e2e8f0;
    color: #1a3a6e;
    padding: 3px 4px;
    font-weight: 800;
    border: 1px solid #cbd5e1;
    text-align: center;
    font-size: 10px;
  }
  .papers-table td {
    padding: 3px 4px;
    border: 1px solid #e2e8f0;
    text-align: center;
    font-weight: 600;
    font-size: 10px;
  }
  .papers-table tr:nth-child(even) td { background: #f8fafc; }
  .binding-sub {
    font-size: 8.5px;
    color: #6b7280;
    margin-top: 1px;
  }

  /* ── BINDING TAGS ── */
  .binding-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 2px;
  }
  .binding-tag {
    background: #dbeafe;
    border: 1px solid #93c5fd;
    color: #1e40af;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* ── PRIORITY BADGE ── */
  .priority-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .priority-Urgent { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
  .priority-High   { background: #ffedd5; color: #ea580c; border: 1px solid #fdba74; }
  .priority-Medium { background: #fef9c3; color: #ca8a04; border: 1px solid #fde047; }
  .priority-Low    { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }

  /* ── OPERATOR FIELDS ── */
  .operator-field { margin-bottom: 8px; }
  .operator-label {
    font-size: 10px;
    color: #374151;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .operator-line {
    border-bottom: 1px solid #374151;
    height: 15px;
    width: 100%;
  }

  /* ── APPROVAL ROW ── */
  .approval-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 700;
  }

  /* ── SIGNATURE ── */
  .signature-area { margin-top: 12px; text-align: right; }
  .signature-line {
    border-top: 1.5px solid #374151;
    width: 120px;
    margin-left: auto;
    margin-top: 28px;
  }
  .signature-label {
    font-size: 10px;
    color: #6b7280;
    margin-top: 3px;
    text-align: center;
    width: 120px;
    margin-left: auto;
  }

  /* ── FOOTER ── */
  .card-footer {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-top: none;
    padding: 5px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: #64748b;
  }
  .card-footer strong { color: #1a3a6e; font-size: 10.5px; }

  /* ── SPECIAL INSTRUCTION BOX ── */
  .special-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 3px;
    padding: 5px 7px;
    margin-top: 3px;
    font-size: 10px;
    font-weight: 700;
    color: #92400e;
    min-height: 22px;
    line-height: 1.4;
  }
</style>
</head>
<body>
{{PAGES}}
</body>
</html>
